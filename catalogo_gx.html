<script>
        let productos = [];
        let numWhatsApp = "";

        async function cargarDatos() {
            const urlParams = new URLSearchParams(window.location.search);
            const serialCliente = urlParams.get('serial');
            if (!serialCliente) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500">Error: No se especificó el catálogo.</p>';
                return;
            }

            const urlDatos = `data/${serialCliente.toLowerCase()}.js?t=${new Date().getTime()}`;
            try {
                const response = await fetch(urlDatos);
                if (!response.ok) throw new Error("Catálogo no encontrado");
                const data = await response.json(); 
                procesarDatos(data);
            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500">Error cargando catálogo: ${error.message}</p>`;
            }
        }

        function procesarDatos(data) {
            productos = data.productos || [];
            numWhatsApp = data.telefono_ws || "";
            
            document.getElementById('nombre-tienda').textContent = data.tienda || "TIENDA SIN NOMBRE";
            document.getElementById('contacto-tienda').textContent = numWhatsApp ? "WhatsApp: " + numWhatsApp : "";
            
            if(numWhatsApp) {
                document.getElementById('btn-whatsapp-general').href = `https://wa.me/${numWhatsApp}?text=Hola, quiero consultar sobre productos.`;
            } else {
                document.getElementById('btn-whatsapp-general').classList.add('hidden');
            }
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('contenedor-productos').classList.remove('hidden');
            cargarProductos(productos);
        }

        function cargarProductos(lista) {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = "";
            lista.forEach(prod => {
                const precio = parseFloat(prod.precio) || 0;
                const estado = prod.stock > 0 ? `<span class="text-emerald-600 font-bold">Disponible</span>` : `<span class="text-red-500 font-bold">Agotado</span>`;
                
                contenedor.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow">
                        <img src="${prod.foto}" class="h-32 w-full object-cover" onerror="this.src='https://placehold.co/300x300?text=Sin+Foto'">
                        <div class="p-3">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">${prod.codigo}</p>
                            <h3 class="text-sm font-medium line-clamp-2 h-10">${prod.detalle}</h3>
                            <div class="flex justify-between items-center mt-2">
                                <p class="text-sm font-bold text-[#2e1065]">$${precio.toFixed(2)}</p>
                                <p class="text-[9px]">${estado}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filtrarProductos() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => p.detalle.toLowerCase().includes(texto) || p.codigo.toLowerCase().includes(texto));
            cargarProductos(filtrados);
        }

        window.onload = cargarDatos;
    </script>
