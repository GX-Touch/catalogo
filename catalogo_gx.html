<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital | GX-Cloud</title>
    <!-- Tailwind CSS para diseño moderno y fluido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Iconos Font-Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800">

    <!-- ENCABEZADO CON COLORES GX-CLOUD (Morado Profundo) -->
    <header class="bg-[#2e1065] text-white sticky top-0 z-50 shadow-md border-b-4 border-[#8b5cf6]">
        <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div>
                    <h1 id="nombre-tienda" class="text-2xl font-bold tracking-tight text-white">MI TIENDA GX-CLOUD</h1>
                    <p class="text-xs text-violet-200">Inventario Sincronizado en Tiempo Real</p>
                </div>
                <!-- Badge de Estado En Línea -->
                <span class="bg-[#8b5cf6] text-white text-xs font-bold px-3 py-1 rounded-full shadow-sm animate-pulse">
                    ● EN LÍNEA
                </span>
            </div>
            
            <!-- BUSCADOR CON DISEÑO PREMIUM -->
            <div class="relative mt-1">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-violet-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input type="text" id="buscador" onkeyup="filtrarProductos()" placeholder="Buscar por código, detalle o marca..." 
                    class="w-full bg-slate-100 text-slate-900 pl-10 pr-4 py-3 rounded-xl border-none focus:ring-2 focus:ring-[#8b5cf6] focus:bg-white outline-none shadow-inner placeholder-slate-400 text-sm transition-all">
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <!-- ESTADO DE CARGA -->
        <div id="loading" class="text-center py-12">
            <i class="fa-solid fa-circle-notch animate-spin text-4xl text-[#2e1065] mb-3"></i>
            <p class="text-slate-500 font-medium">Conectando con la base de datos de Google Drive...</p>
        </div>

        <!-- CONTENEDOR DE PRODUCTOS -->
        <div id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-4 hidden">
            <!-- Se carga de forma dinámica -->
        </div>

        <!-- MENSAJE DE NO ENCONTRADO -->
        <div id="sin-resultados" class="hidden text-center py-12 bg-white rounded-2xl border border-slate-200 p-6 shadow-xs">
            <i class="fa-solid fa-box-open text-slate-300 text-5xl mb-3"></i>
            <p class="text-slate-600 font-medium">No encontramos productos que coincidan.</p>
        </div>
    </main>

    <!-- FOOTER GRIS OSCURO -->
    <footer class="bg-slate-950 text-slate-400 text-center py-8 text-xs mt-12 border-t border-slate-800">
        <p class="mb-1">© 2026 Powered by <span class="text-[#8b5cf6] font-bold">GX-TOUCH</span> Systems</p>
        <p class="text-[10px] text-slate-600">Conexión directa segura vía Google Drive API</p>
    </footer>

    <script>
        let productos = [];

        // Función para leer los parámetros de la URL (?driveId=TU_ID_DE_GOOGLE_DRIVE)
        function obtenerParametroUrl(nombre) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(nombre);
        }

        async function cargarDatos() {
            const driveId = obtenerParametroUrl('driveId');
            
            // Si no hay parámetro, intentamos buscar el productos.js local (modo simulación de tu PC)
            if (!driveId) {
                console.log("Cargando modo simulación local...");
                try {
                    const script = document.createElement('script');
                    script.src = "productos.js";
                    script.onload = () => procesarDatos(window.data_catalogo);
                    script.onerror = () => mostrarError(
                        "Falta el archivo 'productos.js' en esta carpeta o necesitas pasar el parámetro '?driveId=' en la URL para leer desde internet.",
                        "Modo simulación local activo. Asegúrate de que productos.js exista al lado de este archivo."
                    );
                    document.body.appendChild(script);
                } catch (e) {
                    mostrarError("Error crítico de inicialización local.", e.message);
                }
                return;
            }

            // Enlace original limpio de Google Drive
            const urlOriginalDrive = `https://drive.google.com/uc?export=download&id=${driveId}`;
            
            // Rotación inteligente de Proxies para evadir bloqueos de CORS y 403
            const proxies = [
                `https://corsproxy.io/?${encodeURIComponent(urlOriginalDrive)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(urlOriginalDrive)}`,
                `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(urlOriginalDrive)}`
            ];

            let exito = false;
            let ultimoError = "";

            // Bucle de reintentos con diferentes servidores proxies
            for (let i = 0; i < proxies.length; i++) {
                try {
                    console.log(`Intentando conectar mediante Proxy Servidor ${i + 1}...`);
                    const response = await fetch(proxies[i]);
                    
                    if (!response.ok) {
                        throw new Error(`Servidor Proxy ${i + 1} respondió con código: ${response.status}`);
                    }
                    
                    const textoScript = await response.text();
                    
                    // Extraemos el objeto JSON de la estructura 'const data_catalogo = { ... }'
                    const posicionIgual = textoScript.indexOf('=');
                    if (posicionIgual === -1) {
                        throw new Error("El archivo descargado no tiene la asignación 'data_catalogo = ' al principio.");
                    }
                    
                    let textoJson = textoScript.substring(posicionIgual + 1).trim();
                    
                    // Limpiamos punto y coma final si existe
                    if (textoJson.endsWith(';')) {
                        textoJson = textoJson.slice(0, -1);
                    }
                    
                    const data = JSON.parse(textoJson);
                    procesarDatos(data);
                    exito = true;
                    break; // Salimos del bucle si logramos cargar con éxito
                    
                } catch (error) {
                    console.warn(`Fallo en el intento con Proxy ${i + 1}:`, error.message);
                    ultimoError = error.message;
                }
            }

            if (!exito) {
                mostrarError(
                    "No se pudo sincronizar el inventario. Asegúrate de que el archivo 'productos.js' en Google Drive esté compartido como 'Cualquier persona con el enlace' (Público).",
                    `Detalles de todos los intentos fallidos: ${ultimoError}`
                );
            }
        }

        // Procesa la información una vez obtenida de forma local o remota
        function procesarDatos(data) {
            try {
                if (data && typeof data === 'object') {
                    const datos = data.productos ? data : window.data_catalogo;
                    
                    if (!datos || !datos.productos) {
                        throw new Error("La propiedad 'productos' no se encuentra definida en la base de datos.");
                    }

                    productos = datos.productos || [];
                    
                    if (datos.tienda) {
                        document.getElementById('nombre-tienda').textContent = datos.tienda.toUpperCase();
                    }

                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('contenedor-productos').classList.remove('hidden');
                    cargarProductos(productos);
                } else {
                    throw new Error("El formato del archivo JSON de productos es inválido.");
                }
            } catch (error) {
                mostrarError("Estructura de datos en 'productos.js' incorrecta o corrupta.", error.message);
            }
        }

        // Muestra el aviso visual de error en pantalla con detalle de depuración
        function mostrarError(mensajeDetallado, errorTecnico = "") {
            document.getElementById('loading').innerHTML = `
                <div class="text-rose-500 py-6 bg-white rounded-2xl border border-slate-200 shadow-sm p-6 max-w-md mx-auto text-center">
                    <i class="fa-solid fa-circle-exclamation text-4xl mb-3"></i>
                    <p class="font-bold text-lg text-slate-800">Error de Sincronización</p>
                    <p class="text-sm text-slate-500 mt-2 leading-relaxed">${mensajeDetallado}</p>
                    ${errorTecnico ? `
                    <div class="mt-4 text-left">
                        <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Detalle de error para soporte:</span>
                        <div class="text-[11px] text-slate-600 mt-1 bg-slate-50 p-2.5 rounded-lg border border-slate-100 font-mono break-all leading-normal">
                            ${errorTecnico}
                        </div>
                    </div>` : ''}
                </div>`;
        }

        // Renderiza los productos en pantalla
        function cargarProductos(lista) {
            const contenedor = document.getElementById('contenedor-productos');
            const sinResultados = document.getElementById('sin-resultados');
            
            contenedor.innerHTML = "";
            if (lista.length === 0) {
                sinResultados.classList.remove('hidden');
                return;
            }
            sinResultados.classList.add('hidden');

            lista.forEach(prod => {
                const tieneStock = prod.stock > 0;
                const badgeStock = tieneStock 
                    ? `<span class="text-[11px] font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">Disponible: ${prod.stock}</span>`
                    : `<span class="text-[11px] font-semibold text-rose-600 bg-rose-50 px-2 py-0.5 rounded">Agotado</span>`;

                const tarjeta = `
                    <div class="bg-white rounded-2xl shadow-xs border border-slate-200/80 overflow-hidden flex flex-col justify-between group hover:shadow-md transition-all duration-200">
                        <div class="relative bg-slate-50 h-36 flex items-center justify-center overflow-hidden">
                            <img src="${prod.foto}" alt="${prod.detalle}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://placehold.co/300x300?text=Sin+Foto'">
                        </div>
                        <div class="p-3.5 flex flex-col flex-grow justify-between gap-3">
                            <div>
                                <p class="text-[10px] uppercase font-bold tracking-wider text-slate-400">${prod.codigo}</p>
                                <h3 class="text-sm font-medium text-slate-800 line-clamp-2 leading-tight">${prod.detalle}</h3>
                            </div>
                            <div class="pt-2 border-t border-slate-100 flex flex-col gap-1.5">
                                <span class="text-base font-bold text-[#2e1065]">$${parseFloat(prod.precio).toFixed(2)}</span>
                                ${badgeStock}
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += tarjeta;
            });
        }

        function filtrarProductos() {
            const text = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => 
                p.detalle.toLowerCase().includes(text) || 
                p.codigo.toLowerCase().includes(text)
            );
            cargarProductos(filtrados);
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
