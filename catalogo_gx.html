<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital | GX-Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style> body { font-family: 'DM Sans', sans-serif; background-color: #f1f5f9; } </style>
</head>
<body class="text-slate-800 pb-20">
    
    <header class="bg-[#2e1065] text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 relative">
            <h1 id="nombre-tienda" class="text-lg md:text-2xl font-bold">CARGANDO...</h1>
            <p id="rif-tienda" class="text-[10px] md:text-sm text-violet-300 font-bold"></p>
            <p id="contacto-tienda" class="text-xs md:text-base text-violet-200 mt-1"></p>
            
            <div class="absolute top-4 right-4">
                <img id="logo-empresa" src="" class="h-16 w-16 object-contain bg-white rounded-full border-2 border-violet-300 shadow-lg">
            </div>
            
            <div class="flex gap-2 mt-3 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-sm"></i>
                <input type="text" id="buscador" onkeyup="filtrar()" placeholder="Buscar producto..." class="w-full p-2 pl-9 rounded-lg text-slate-900 text-sm">
                <select id="filtro-cat" onchange="filtrar()" class="p-2 rounded-lg text-slate-900 text-sm">
                    <option value="">Categorías</option>
                </select>
            </div>
        </div>
    </header>

    <div id="franja-info" class="bg-slate-200 py-2 px-4 text-center border-b border-slate-300 hidden">
        <p id="texto-aviso" class="text-xs md:text-sm font-bold text-slate-700 tracking-wide uppercase"></p>
    </div>

    <div id="contenedor-banner" class="max-w-4xl mx-auto px-4 pt-4 hidden">
        <img id="img-banner-promo" src="" class="w-full rounded-2xl shadow-md">
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <div id="loading" class="text-center py-10 font-bold text-slate-600">Cargando catálogo...</div>
        <div id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <a id="btn-whatsapp-general" href="#" target="_blank" class="fixed bottom-6 right-6 bg-emerald-500 text-white p-4 rounded-full shadow-lg hover:bg-emerald-600 z-50">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <script>
        let datosGlobales = { productos: [] };

        async function cargarDatos() {
            const params = new URLSearchParams(window.location.search);
            const serial = params.get('serial');
            if(!serial) { document.getElementById('loading').textContent = "Error: Falta el parámetro 'serial'."; return; }

            try {
                const response = await fetch(`data/${serial.toLowerCase()}.js?t=${new Date().getTime()}`);
                const texto = await response.text();
                const data = JSON.parse(texto.trim().replace(/^\uFEFF/, ''));
                
                // Info Básica
                document.getElementById('nombre-tienda').textContent = data.tienda;
                document.getElementById('rif-tienda').textContent = data.rif;
                document.getElementById('contacto-tienda').textContent = "WhatsApp: " + data.telefono_ws;
                
                // Mostrar Avisos
                if (data.texto_aviso && data.texto_aviso.trim() !== "") {
                    document.getElementById('franja-info').classList.remove('hidden');
                    document.getElementById('texto-aviso').innerHTML = `<i class="fa-solid fa-circle-info mr-2"></i> ${data.texto_aviso}`;
                }
                if (data.mostrar_promo === true && data.url_promo) {
                    document.getElementById('contenedor-banner').classList.remove('hidden');
                    document.getElementById('img-banner-promo').src = data.url_promo;
                }

                // Logo
                const imgLogo = document.getElementById('logo-empresa');
                if (data.logo && data.logo.length > 5) imgLogo.src = data.logo; else imgLogo.style.display = 'none';
                
                document.getElementById('btn-whatsapp-general').href = `https://wa.me/${data.telefono_ws}?text=¡Hola! 👋 Vi el catálogo de *${data.tienda}* y me gustaría recibir más información.`;
                document.getElementById('loading').style.display = 'none';
                
                datosGlobales.productos = data.productos;
                
                // Llenar Categorías (CORRECCIÓN AQUÍ)
                const select = document.getElementById('filtro-cat');
                const categorias = [...new Set(data.productos.map(p => p.categoria))];
                categorias.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c; opt.textContent = c;
                    select.appendChild(opt);
                });
                
                render(data.productos);
            } catch (e) { document.getElementById('loading').innerHTML = "Error al cargar datos: " + e.message; }
        }

        function render(lista) {
            const cont = document.getElementById('contenedor-productos');
            cont.innerHTML = "";
            lista.forEach(p => {
                const esInactivo = p.activo && p.activo.toUpperCase() === "INACTIVO";
                const stock = parseFloat(p.stock);
                let textoEstado = "", claseEstado = "";
                
                if (esInactivo) { textoEstado = "No Disponible"; claseEstado = "text-red-600"; }
                else if (stock > 0) { textoEstado = "Disponible"; claseEstado = "text-green-600"; }
                else { textoEstado = "Agotado"; claseEstado = "text-red-500"; }

                const precio = (p.origen === 'ESTANDAR') ? 'Bs. ' + parseFloat(p.precioBs).toFixed(2) : '$ ' + parseFloat(p.precio).toFixed(2);
                
                cont.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl border shadow-sm">
                        <img src="${p.foto}" class="h-40 sm:h-48 w-full object-cover object-center rounded-lg" onerror="this.src='https://placehold.co/128x128?text=Sin+Foto'">
                        <p class="text-[10px] font-bold text-slate-400 mt-2">${p.codigo}</p>
                        <h3 class="text-sm font-medium h-10 line-clamp-2">${p.detalle}</h3>
                        <p class="text-lg font-bold text-[#2e1065] my-1">${precio}</p>
                        <p class="text-xs font-bold ${claseEstado}">${textoEstado}</p>
                        <a href="https://wa.me/${p.tel}?text=¡Hola! ?? Me interesa el producto: *${p.detalle}* (Ref: ${p.codigo}). ¿Podrías darme más detalles o disponibilidad?" class="block mt-3 w-full ${esInactivo ? 'bg-slate-400 cursor-not-allowed' : 'bg-slate-800'} text-white text-center py-2 rounded-lg text-[10px] font-bold">
                            <i class="fa-brands fa-whatsapp"></i> CONSULTAR
                        </a>
                    </div>`;
            });
        }

        function filtrar() {
            const t = document.getElementById('buscador').value.toLowerCase();
            const c = document.getElementById('filtro-cat').value;
            render(datosGlobales.productos.filter(p => 
                (p.detalle.toLowerCase().includes(t) || p.codigo.toLowerCase().includes(t)) && 
                (c === "" || p.categoria === c)
            ));
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
