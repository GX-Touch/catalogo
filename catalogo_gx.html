<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital | GX-Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 pb-20">

    <header class="bg-[#2e1065] text-white sticky top-0 z-50 shadow-md border-b-4 border-[#8b5cf6]">
        <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div>
                    <h1 id="nombre-tienda" class="text-xl font-bold tracking-tight text-white">CARGANDO...</h1>
                    <p id="contacto-tienda" class="text-xs text-violet-200">Sincronizando datos...</p>
                </div>
                <span class="bg-green-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-sm shadow-green-500/50 animate-pulse">
                    ● EN LÍNEA
                </span>
            </div>
            
            <div class="relative mt-1">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-violet-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input type="text" id="buscador" onkeyup="filtrarProductos()" placeholder="Buscar producto..." 
                    class="w-full bg-slate-100 text-slate-900 pl-10 pr-4 py-3 rounded-xl border-none focus:ring-2 focus:ring-[#8b5cf6] focus:bg-white outline-none shadow-inner placeholder-slate-400 text-sm transition-all">
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <div id="loading" class="text-center py-12">
            <i class="fa-solid fa-circle-notch animate-spin text-4xl text-[#2e1065] mb-3"></i>
            <p class="text-slate-500 font-medium">Cargando catálogo...</p>
        </div>

        <div id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-4 hidden"></div>
    </main>

    <a id="btn-whatsapp-general" href="#" target="_blank" class="fixed bottom-6 right-6 bg-emerald-500 text-white p-4 rounded-full shadow-lg hover:bg-emerald-600 transition-all z-50">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <script>
        let productos = [];
        let numWhatsApp = "";

        async function cargarDatos() {
            const urlParams = new URLSearchParams(window.location.search);
            const serialCliente = urlParams.get('serial');
            if (!serialCliente) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500">Error: No se especificó el catálogo.</p>';
                return;
            }

            const urlDatos = `data/${serialCliente.toLowerCase()}.js?t=${new Date().getTime()}`;
            try {
                const response = await fetch(urlDatos);
                if (!response.ok) throw new Error("Catálogo no encontrado");
                const data = await response.json(); 
                procesarDatos(data);
            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500">Error cargando catálogo: ${error.message}</p>`;
            }
        }

        function procesarDatos(data) {
            productos = data.productos || [];
            numWhatsApp = data.telefono_ws || "";
            
            document.getElementById('nombre-tienda').textContent = data.tienda || "TIENDA SIN NOMBRE";
            document.getElementById('contacto-tienda').textContent = numWhatsApp ? "WhatsApp: " + numWhatsApp : "";
            
            if(numWhatsApp) {
                document.getElementById('btn-whatsapp-general').href = `https://wa.me/${numWhatsApp}?text=Hola, quiero consultar sobre productos.`;
            } else {
                document.getElementById('btn-whatsapp-general').classList.add('hidden');
            }
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('contenedor-productos').classList.remove('hidden');
            cargarProductos(productos);
        }

        function cargarProductos(lista) {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = "";
            lista.forEach(prod => {
                const precio = parseFloat(prod.precio) || 0;
                const estado = prod.stock > 0 ? `<span class="text-emerald-600 font-bold">Disponible</span>` : `<span class="text-red-500 font-bold">Agotado</span>`;
                
                contenedor.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow">
                        <img src="${prod.foto}" class="h-32 w-full object-cover" onerror="this.src='https://placehold.co/300x300?text=Sin+Foto'">
                        <div class="p-3">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">${prod.codigo}</p>
                            <h3 class="text-sm font-medium line-clamp-2 h-10">${prod.detalle}</h3>
                            <div class="flex justify-between items-center mt-2">
                                <p class="text-sm font-bold text-[#2e1065]">$${precio.toFixed(2)}</p>
                                <p class="text-[9px]">${estado}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filtrarProductos() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => p.detalle.toLowerCase().includes(texto) || p.codigo.toLowerCase().includes(texto));
            cargarProductos(filtrados);
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
