<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital | GX-Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style> body { font-family: 'DM Sans', sans-serif; background-color: #f1f5f9; } </style>
</head>
<body class="text-slate-800 pb-20">
    
    <header class="bg-[#2e1065] text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 relative">
            <h1 id="nombre-tienda" class="text-lg md:text-2xl font-bold">CARGANDO...</h1>
            <p id="rif-tienda" class="text-[10px] md:text-sm text-violet-300 font-bold"></p>
            <p id="contacto-tienda" class="text-xs md:text-base text-violet-200 mt-1"></p>
            <div class="absolute top-4 right-4"><img id="logo-empresa" src="" class="h-16 w-16 object-contain bg-white rounded-full border-2 border-violet-300 shadow-lg"></div>
            <div class="flex gap-2 mt-3 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-sm"></i>
                <input type="text" id="buscador" onkeyup="filtrar()" placeholder="Buscar producto..." class="w-full p-2 pl-9 rounded-lg text-slate-900 text-sm">
                <select id="filtro-cat" onchange="filtrar()" class="p-2 rounded-lg text-slate-900 text-sm"><option value="">Categorías</option></select>
            </div>
        </div>
    </header>

    <div id="franja-info" class="bg-slate-200 py-2 px-4 text-center border-b border-slate-300 hidden"><p id="texto-aviso" class="text-xs md:text-sm font-bold text-slate-700 tracking-wide uppercase"></p></div>

    <div id="contenedor-banner" class="max-w-4xl mx-auto px-4 pt-4 hidden relative overflow-hidden">
        <div id="carrusel-imagenes" class="flex transition-transform duration-500 rounded-2xl shadow-md"></div>
        <button id="btn-prev" class="absolute left-6 top-1/2 -translate-y-1/2 bg-white/50 p-2 rounded-full hidden"><i class="fa-solid fa-chevron-left"></i></button>
        <button id="btn-next" class="absolute right-6 top-1/2 -translate-y-1/2 bg-white/50 p-2 rounded-full hidden"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <div id="loading" class="text-center py-10 font-bold text-slate-600">Cargando catálogo...</div>
        <div id="contenedor-productos" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <a id="btn-whatsapp-general" href="#" target="_blank" class="fixed bottom-6 right-6 bg-emerald-500 text-white p-4 rounded-full shadow-lg hover:bg-emerald-600 z-50">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <script>
        let datosGlobales = { productos: [] };

        async function cargarDatos() {
            const params = new URLSearchParams(window.location.search);
            const serial = params.get('serial');
            if(!serial) { document.getElementById('loading').textContent = "Error: Falta el parámetro 'serial'."; return; }

            try {
                const response = await fetch(`data/${serial.toLowerCase()}.js?t=${new Date().getTime()}`);
                const texto = await response.text();
                const data = JSON.parse(texto.trim().replace(/^\uFEFF/, ''));
                
                document.getElementById('nombre-tienda').textContent = data.tienda;
                document.getElementById('rif-tienda').textContent = data.rif;
                document.getElementById('contacto-tienda').textContent = "WhatsApp: " + data.telefono_ws;
                
                if (data.texto_aviso && data.texto_aviso.trim() !== "") {
                    document.getElementById('franja-info').classList.remove('hidden');
                    document.getElementById('texto-aviso').innerHTML = `<i class="fa-solid fa-circle-info mr-2"></i> ${data.texto_aviso}`;
                }
                
                // Lógica del Slider Inteligente
                if (data.mostrar_promo === true && data.imagenes_promo && data.imagenes_promo.length > 0) {
                    const cont = document.getElementById('contenedor-banner');
                    const carrusel = document.getElementById('carrusel-imagenes');
                    cont.classList.remove('hidden');
                    data.imagenes_promo.forEach(url => carrusel.innerHTML += `<img src="${url}" class="w-full flex-shrink-0 object-cover">`);
                    
                    if (data.imagenes_promo.length > 1) {
                        document.getElementById('btn-prev').classList.remove('hidden');
                        document.getElementById('btn-next').classList.remove('hidden');
                        let index = 0;
                        document.getElementById('btn-next').onclick = () => { index = (index + 1) % data.imagenes_promo.length; carrusel.style.transform = `translateX(-${index * 100}%)`; };
                        document.getElementById('btn-prev').onclick = () => { index = (index - 1 + data.imagenes_promo.length) % data.imagenes_promo.length; carrusel.style.transform = `translateX(-${index * 100}%)`; };
                    }
                }

                const imgLogo = document.getElementById('logo-empresa');
                if (data.logo && data.logo.length > 5) imgLogo.src = data.logo; else imgLogo.style.display = 'none';
                document.getElementById('btn-whatsapp-general').href = `https://wa.me/${data.telefono_ws}?text=${encodeURIComponent('¡Hola! 👋 Vi el catálogo de *' + data.tienda + '* y me gustaría recibir más información.')}`;
                document.getElementById('loading').style.display = 'none';
                
                datosGlobales.productos = data.productos;
                const select = document.getElementById('filtro-cat');
                [...new Set(data.productos.map(p => p.categoria))].forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; select.appendChild(opt); });
                render(data.productos);
            } catch (e) { document.getElementById('loading').innerHTML = "Error: " + e.message; }
        }

        function render(lista) {
            const cont = document.getElementById('contenedor-productos');
            cont.innerHTML = "";
            lista.forEach(p => {
                const esInactivo = p.activo && p.activo.toUpperCase() === "INACTIVO";
                const precio = (p.origen === 'ESTANDAR') ? 'Bs. ' + parseFloat(p.precioBs).toFixed(2) : '$ ' + parseFloat(p.precio).toFixed(2);
                cont.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl border shadow-sm">
                        <img src="${p.foto}" class="h-40 w-full object-cover rounded-lg" onerror="this.src='https://placehold.co/128x128?text=Sin+Foto'">
                        <p class="text-[10px] font-bold text-slate-400 mt-2">${p.codigo}</p>
                        <h3 class="text-sm font-medium h-10 line-clamp-2">${p.detalle}</h3>
                        <p class="text-lg font-bold text-[#2e1065] my-1">${precio}</p>
                        <a href="https://wa.me/${p.tel}?text=${encodeURIComponent('¡Hola! 👋 Me interesa: *' + p.detalle + '* (Ref: ' + p.codigo + ')?.')}" class="block mt-3 w-full ${esInactivo ? 'bg-slate-400 cursor-not-allowed' : 'bg-slate-800'} text-white text-center py-2 rounded-lg text-[10px] font-bold">
                            <i class="fa-brands fa-whatsapp"></i> CONSULTAR
                        </a>
                    </div>`;
            });
        }

        function filtrar() {
            const t = document.getElementById('buscador').value.toLowerCase();
            const c = document.getElementById('filtro-cat').value;
            render(datosGlobales.productos.filter(p => (p.detalle.toLowerCase().includes(t) || p.codigo.toLowerCase().includes(t)) && (c === "" || p.categoria === c)));
        }
        window.onload = cargarDatos;
    </script>
</body>
</html>
